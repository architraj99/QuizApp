<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizApp</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">

    <div class="badge">
      QuizApp
    </div>

    <h1>Minimal quiz challenge</h1>
    <p class="sub">Answer timed multiple-choice questions and test your knowledge.</p>

    <div class="start-screen">

      <div class="quiz-info">

        <div class="info-box">
            
          <p class="info-label">Questions</p>
          <p class="info-value">10</p>
        </div>

        <div class="info-box">

          <p class="info-label">Time</p>
          <p class="info-value">15s</p>
        </div>

      </div>

      <button id="startBtn">Start Quiz</button>
      
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
