<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    QuizApp
  </title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">

    <div class="badge">
      QuizApp
    </div>

    <div id="startScreen">

      <h1>Minimal quiz challenge</h1>

      <p class="sub">Answer timed multiple choice questions and test your knowledge.</p>

      <div class="quiz-info">

        <div class="info-box">

          <p class="info-label">Questions</p>
          <p class="info-value">10</p>
        </div>
           
        <div class="info-box">
            
            <p class="info-label">Time</p>
            <p class="info-value">15s</p>
        </div>

      </div>

      <button id="startBtn">Start Quiz</button>

    </div>

    <div class="quiz-screen" id="quizScreen">

      <div class="quiz-top">

        <p class="question-count" id="questionCount">Question 1 / 10</p>
        <p class="score" id="score">Score: 0</p>
      </div>

      <div class="progress">

        <div class="progress-fill" id="progressFill"></div>

      </div>

      <div class="question-box">

        <div class="question-row">

          <h2 class="question" id="question">Question text</h2>

          <div class="timer" id="timer">15s</div>

        </div>

      </div>

      <div class="options" id="options"></div>

      <div class="bottom-actions">

        <button class="quit-btn" id="quitBtn">Quit</button>

        <button class="next-btn" id="nextBtn">Next</button>

      </div>
      
    </div>

    <div class="result-screen" id="resultScreen">
        
        <h2 id="resultTitle">Quiz Completed</h2>

      <p class="result-text" id="resultText">You scored 0/10</p>
      <button id="restartBtn">Play Again</button>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
